  <ul class="nav-links">

  </ul>

  <button class="nav-hamburger" aria-label="Toggle menu" aria-expanded="false" onclick="toggleMenu(this)">

</nav>

<div class="nav-mobile-menu" id="mobile-menu">
  <ul>
    <li><a href="{{ '/services.html' | relative_url }}" {% if page.nav == 'services' %}class="active"{% endif %}>Services</a></li>
    <li><a href="{{ '/portfolio.html' | relative_url }}" {% if page.nav == 'portfolio' %}class="active"{% endif %}>Portfolio</a></li>
    <li><a href="{{ '/process.html' | relative_url }}" {% if page.nav == 'process' %}class="active"{% endif %}>Process</a></li>

  </ul>
</div>

<script>
  function toggleMenu(btn) {
    const menu = document.getElementById('mobile-menu');
    const isOpen = menu.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.setAttribute('aria-expanded', isOpen);
    document.body.style.overflow = isOpen ? 'hidden' : '';
  }
  document.addEventListener('click', function(e) {
    const menu = document.getElementById('mobile-menu');
    const btn = document.querySelector('.nav-hamburger');
    if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) {
      menu.classList.remove('open');
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', false);
      document.body.style.overflow = '';
    }
  });
</script>
