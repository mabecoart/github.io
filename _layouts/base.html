<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — María Copello{% else %}María Copello — Salesforce Marketing Cloud Developer{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — María Copello{% else %}María Copello — Salesforce Marketing Cloud Developer{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ '/images/portrait_mabeco_orange.png' | absolute_url }}" />
  <meta property="og:site_name" content="María Copello" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — María Copello{% else %}María Copello — Salesforce Marketing Cloud Developer{% endif %}" />
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}" />
  <meta name="twitter:image" content="{{ '/images/portrait_mabeco_orange.png' | absolute_url }}" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "María Copello",
    "jobTitle": "Salesforce Marketing Cloud Developer",
    "url": "{{ site.url }}/",
    "image": "{{ '/images/portrait_mabeco_orange.png' | absolute_url }}",
    "sameAs": [ "https://www.linkedin.com/in/maria-belen-copello/" ]
  }
  </script>
  <link rel="icon" type="image/x-icon" href="{{ '/images/favicon.ico' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Signika:wght@400;600;700&family=Roboto:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />
  {% if page.page_css %}<style>{{ page.page_css }}</style>{% endif %}
</head>
<body>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

</body>
</html>
